<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frida JavaScript API Docs Summary - By 0xCyberSolider</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

  :root {
    --red: #cc2200;
    --red-bright: #ff2a00;
    --red-dim: #7a1500;
    --red-glow: rgba(204, 34, 0, 0.15);
    --bg: #0d0d0d;
    --bg2: #111111;
    --border: #4a0d00;
    --border-bright: #cc2200;
    --text: #cc2200;
    --text-dim: #7a1500;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    min-height: 100vh;
    padding: 30px 20px 60px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(180,20,0,0.08) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(204,34,0,0.015) 2px, rgba(204,34,0,0.015) 4px);
  }

  h1 {
    font-family: 'VT323', monospace;
    font-size: clamp(2rem, 4vw, 3.2rem);
    text-align: center;
    color: var(--red-bright);
    text-shadow: 0 0 20px rgba(255,42,0,0.5), 0 0 60px rgba(255,42,0,0.2);
    letter-spacing: 3px;
    margin-bottom: 36px;
    line-height: 1.2;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%,94%,96%,100% { opacity: 1; }
    95% { opacity: 0.85; }
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Search bar */
  .search-wrap {
    margin-bottom: 24px;
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .search-wrap input {
    flex: 1;
    background: #0a0a0a;
    border: 1px solid var(--border);
    color: var(--red-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 8px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--red-bright); box-shadow: 0 0 10px rgba(204,34,0,0.2); }
  .search-wrap input::placeholder { color: var(--red-dim); }

  .search-wrap select {
    background: #0a0a0a;
    border: 1px solid var(--border);
    color: var(--red);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }

  /* Table */
  .table-wrap {
    border: 1px solid var(--border-bright);
    box-shadow: 0 0 30px rgba(204,34,0,0.12), inset 0 0 60px rgba(0,0,0,0.4);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: #110500;
  }

  thead th {
    padding: 12px 16px;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem;
    color: var(--red);
    border: 1px solid var(--border);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Column widths */
  col.col-cat   { width: 22%; }
  col.col-sec   { width: 18%; }
  col.col-prop  { width: 22%; }
  col.col-exp   { width: 38%; }

  tbody tr {
    transition: background 0.15s;
  }
  tbody tr:hover {
    background: rgba(204,34,0,0.07);
  }
  tbody tr.hidden { display: none; }

  tbody td {
    padding: 9px 14px;
    border: 1px solid var(--border);
    font-size: 0.82rem;
    vertical-align: top;
    color: var(--text-dim);
    line-height: 1.5;
  }

  /* Category cell spans multiple rows - styled distinctly */
  td.cat-cell {
    background: #0f0300;
    color: var(--red);
    font-weight: bold;
    text-align: center;
    font-size: 0.88rem;
    letter-spacing: 0.5px;
    border-right: 2px solid var(--border-bright);
    vertical-align: middle;
  }

  /* Section cell */
  td.sec-cell {
    color: var(--red);
    font-weight: bold;
    font-size: 0.84rem;
    border-right: 1px solid var(--border);
    vertical-align: middle;
  }

  /* Property cell */
  td.prop-cell {
    color: #e05500;
    font-size: 0.78rem;
    font-family: 'Share Tech Mono', monospace;
  }

  td.prop-cell code {
    background: rgba(204,34,0,0.08);
    padding: 1px 5px;
    border-radius: 2px;
    font-size: 0.76rem;
    color: #ff4400;
    display: inline-block;
    margin: 1px 0;
  }

  /* Explain cell */
  td.exp-cell {
    color: #884422;
    font-size: 0.78rem;
    line-height: 1.6;
  }

  /* Category section header rows */
  tr.cat-header td {
    background: #150400;
    color: var(--red-bright);
    font-weight: bold;
    text-align: center;
    font-size: 0.9rem;
    letter-spacing: 1px;
    padding: 10px 14px;
    border-top: 2px solid var(--border-bright);
    text-shadow: 0 0 10px rgba(255,42,0,0.3);
  }

  /* Stats bar */
  .stats {
    margin-top: 16px;
    font-size: 0.72rem;
    color: var(--red-dim);
    text-align: right;
    letter-spacing: 0.5px;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.05) 3px,
      rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>
<div class="container">

  <h1>Frida JavaScript API Docs Summary<br>— By 0xCyberSolider —</h1>

  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search API... (property, section, description)" oninput="filterTable()">
    <select id="catFilter" onchange="filterTable()">
      <option value="">All Categories</option>
      <option>Runtime information</option>
      <option>Process / Thread / Module / Memory</option>
      <option>Data Types / Function / Callback</option>
      <option>Network</option>
      <option>File and Stream</option>
      <option>Database</option>
      <option>Instrumentation</option>
      <option>CPU Instruction</option>
      <option>Other</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="apiTable">
      <colgroup>
        <col class="col-cat">
        <col class="col-sec">
        <col class="col-prop">
        <col class="col-exp">
      </colgroup>
      <thead>
        <tr>
          <th>Category</th>
          <th>Section</th>
          <th>Property / Method</th>
          <th>Explanation</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="stats" id="stats"></div>
</div>

function buildTable(rows) {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  // Group by category
  const cats = {};
  rows.forEach(r => {
    if (!cats[r.cat]) cats[r.cat] = {};
    if (!cats[r.cat][r.sec]) cats[r.cat][r.sec] = [];
    cats[r.cat][r.sec].push(r);
  });

  let total = 0;
  for (const [cat, secs] of Object.entries(cats)) {
    // Category header spanning all cols
    const hdr = document.createElement('tr');
    hdr.className = 'cat-header';
    hdr.innerHTML = `<td colspan="4">${cat}</td>`;
    tbody.appendChild(hdr);

    for (const [sec, items] of Object.entries(secs)) {
      items.forEach((item, idx) => {
        const tr = document.createElement('tr');
        tr.dataset.cat = cat;
        tr.dataset.sec = sec;
        tr.dataset.prop = item.prop.toLowerCase();
        tr.dataset.exp = item.exp.toLowerCase();

        let catCell = '';
        if (idx === 0) {
          catCell = `<td class="cat-cell" rowspan="${items.length}">${sec}</td>`;
        }

        tr.innerHTML = `
          ${idx === 0 ? catCell : ''}
          <td class="prop-cell"><code>${item.prop}</code></td>
          <td class="exp-cell">${item.exp}</td>
        `;
        tbody.appendChild(tr);
        total++;
      });
    }
  }
  document.getElementById('stats').textContent = `> ${total} entries displayed`;
}

function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const cf = document.getElementById('catFilter').value;

  const filtered = data.filter(r => {
    const matchCat = !cf || r.cat === cf;
    const matchQ = !q || r.prop.toLowerCase().includes(q) || r.exp.toLowerCase().includes(q) || r.sec.toLowerCase().includes(q) || r.cat.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  buildTable(filtered);
}

buildTable(data);
